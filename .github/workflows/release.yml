name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist/linux-amd64 dist/linux-arm64 dist/windows-amd64

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "dist/linux-amd64/central-sync"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "dist/linux-arm64/central-sync"
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "dist/windows-amd64/central-sync.exe"

          cp dist/linux-amd64/central-sync dist/central-sync-linux-amd64
          cp dist/linux-arm64/central-sync dist/central-sync-linux-arm64
          cp dist/windows-amd64/central-sync.exe dist/central-sync-windows-amd64.exe
          tar -C dist/linux-amd64 -czf "dist/central-sync-linux-amd64.tar.gz" "central-sync"
          tar -C dist/linux-arm64 -czf "dist/central-sync-linux-arm64.tar.gz" "central-sync"

          cd dist
          sha256sum central-sync-* > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/central-sync-linux-amd64
            dist/central-sync-linux-arm64
            dist/central-sync-linux-amd64.tar.gz
            dist/central-sync-linux-arm64.tar.gz
            dist/central-sync-windows-amd64.exe
            dist/SHA256SUMS
